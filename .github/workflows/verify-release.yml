name: Verify Published Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Exact release tag (vMAJOR.MINOR.PATCH)
        required: true
        type: string
      allow_draft:
        description: Permit verification before publication
        required: true
        default: false
        type: boolean

# Draft releases require push-equivalent release access; the token is removed before executing assets.
permissions:
  contents: write

concurrency:
  group: verify-published-release-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  windows-runtime:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      ALLOW_DRAFT: ${{ inputs.allow_draft }}
    steps:
      - name: Verify receipts, installer, and native runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:RELEASE_TAG
          if ($tag -cnotmatch '^v(?<version>0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$') {
            throw "Release tag must be exact vMAJOR.MINOR.PATCH: $tag"
          }
          $version = $tag.Substring(1)

          $downloadDirectory = Join-Path $env:RUNNER_TEMP "magenta-release"
          $installDirectory = Join-Path $env:RUNNER_TEMP "magenta-install"
          New-Item -ItemType Directory -Force -Path $downloadDirectory | Out-Null

          if ($env:ALLOW_DRAFT -ceq "true") {
            $pages = gh api --paginate --slurp "repos/Minions-Land/Magenta-CLI/releases?per_page=100" | ConvertFrom-Json
            if ($LASTEXITCODE -ne 0) { throw "Unable to list release metadata for $tag" }
            $matches = @()
            foreach ($page in $pages) {
              foreach ($candidate in $page) {
                if ($candidate.tag_name -ceq $tag) { $matches += $candidate }
              }
            }
            if ($matches.Count -ne 1) {
              throw "Expected exactly one release metadata record for $tag, found $($matches.Count)"
            }
            $release = $matches[0]
          } else {
            $release = gh api "repos/Minions-Land/Magenta-CLI/releases/tags/$tag" | ConvertFrom-Json
            if ($LASTEXITCODE -ne 0) { throw "Unable to fetch release metadata for $tag" }
          }
          if ($release.prerelease) { throw "Release must not be a prerelease" }
          if ($release.draft -and $env:ALLOW_DRAFT -cne "true") {
            throw "Draft release verification requires allow_draft=true"
          }

          $expectedAssets = @(
            "SHA256SUMS"
            "SOURCE_COMMIT"
            "install.ps1"
            "magenta-linux-x64"
            "magenta-macos-arm64"
            "magenta-macos-x64"
            "magenta-resources-universal.tar.gz"
            "magenta-windows-x64.exe"
          ) | Sort-Object
          $metadataNames = @($release.assets | ForEach-Object name | Sort-Object)
          if (Compare-Object $expectedAssets $metadataNames) {
            throw "Release metadata asset set does not exactly match the release contract"
          }

          $metadataByName = @{}
          foreach ($asset in $release.assets) {
            if ($metadataByName.ContainsKey($asset.name)) { throw "Duplicate release asset metadata: $($asset.name)" }
            if ($asset.state -cne "uploaded") { throw "Release asset is not uploaded: $($asset.name)" }
            $metadataByName[$asset.name] = $asset
          }
          $downloadHeaders = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/octet-stream"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          try {
            foreach ($name in $expectedAssets) {
              $metadata = $metadataByName[$name]
              $path = Join-Path $downloadDirectory $name
              Invoke-WebRequest `
                -UseBasicParsing `
                -Uri "https://api.github.com/repos/Minions-Land/Magenta-CLI/releases/assets/$($metadata.id)" `
                -Headers $downloadHeaders `
                -OutFile $path
            }
          } finally {
            Remove-Item Env:GH_TOKEN -ErrorAction SilentlyContinue
          }

          $actualAssets = @(Get-ChildItem -LiteralPath $downloadDirectory -File | ForEach-Object Name | Sort-Object)
          if (Compare-Object $expectedAssets $actualAssets) {
            throw "Downloaded asset set does not exactly match the release contract"
          }
          foreach ($name in $expectedAssets) {
            $path = Join-Path $downloadDirectory $name
            $metadata = $metadataByName[$name]
            if ((Get-Item -LiteralPath $path).Length -ne $metadata.size) { throw "Asset size mismatch: $name" }
            if ($metadata.digest -cnotmatch '^sha256:(?<hash>[0-9a-f]{64})$') {
              throw "Asset lacks a valid GitHub SHA-256 digest: $name"
            }
            $actualHash = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualHash -cne $Matches.hash) { throw "GitHub digest mismatch: $name" }
          }

          $manifestExpected = @($expectedAssets | Where-Object { $_ -ne "SHA256SUMS" }) | Sort-Object
          $manifestEntries = @{}
          foreach ($line in [IO.File]::ReadAllLines((Join-Path $downloadDirectory "SHA256SUMS"))) {
            if ($line -cnotmatch '^(?<hash>[0-9a-f]{64})  (?<name>[A-Za-z0-9._-]+)$') {
              throw "Malformed SHA256SUMS line"
            }
            if ($manifestEntries.ContainsKey($Matches.name)) { throw "Duplicate SHA256SUMS entry" }
            $manifestEntries[$Matches.name] = $Matches.hash
          }
          $manifestActual = @($manifestEntries.Keys | Sort-Object)
          if (Compare-Object $manifestExpected $manifestActual) {
            throw "SHA256SUMS does not cover the exact release payload"
          }
          foreach ($name in $manifestExpected) {
            $actualHash = (Get-FileHash -LiteralPath (Join-Path $downloadDirectory $name) -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualHash -cne $manifestEntries[$name]) { throw "Manifest digest mismatch: $name" }
          }

          $sourceCommit = (Get-Content -Raw -LiteralPath (Join-Path $downloadDirectory "SOURCE_COMMIT")).Trim()
          if ($sourceCommit -cnotmatch '^[0-9a-f]{40}$') { throw "SOURCE_COMMIT is not a full commit ID" }

          $assetServer = Start-Process -FilePath "python" -ArgumentList @(
            "-m", "http.server", "8766", "--bind", "127.0.0.1", "--directory", $downloadDirectory
          ) -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            foreach ($attempt in 1..50) {
              try {
                Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:8766/SHA256SUMS" -OutFile (Join-Path $env:RUNNER_TEMP "server-probe")
                $ready = $true
                break
              } catch {
                Start-Sleep -Milliseconds 100
              }
            }
            if (-not $ready) { throw "Local verified-asset server did not become ready" }

            & (Join-Path $downloadDirectory "install.ps1") `
              -InstallDir $installDirectory `
              -Version $tag `
              -Repository "Minions-Land/Magenta-CLI" `
              -AssetBaseUrl "http://127.0.0.1:8766" `
              -NoPath
            if ($LASTEXITCODE -ne 0) { throw "install.ps1 failed" }
          } finally {
            Stop-Process -Id $assetServer.Id -Force -ErrorAction SilentlyContinue
            Wait-Process -Id $assetServer.Id -ErrorAction SilentlyContinue
          }

          $binary = Join-Path $installDirectory "magenta.exe"
          $reportedVersion = (& $binary --version).Trim()
          if ($LASTEXITCODE -ne 0 -or $reportedVersion -cne $version) {
            throw "Installed version mismatch: expected $version, got $reportedVersion"
          }
          & $binary --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Installed Magenta binary failed --help" }

          $processTools = Join-Path $installDirectory "_magenta/process-tools/target/release/magenta-process-tools.exe"
          if (-not (Test-Path -LiteralPath $processTools -PathType Leaf)) { throw "process-tools was not extracted" }
          & $processTools --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "process-tools failed --help" }

          $clipboard = Join-Path $installDirectory "runtime/node_modules/@mariozechner/clipboard-win32-x64-msvc/clipboard.win32-x64-msvc.node"
          node -e 'const binding = require(process.argv[1]); if (typeof binding.getText !== "function") process.exit(1)' $clipboard
          if ($LASTEXITCODE -ne 0) { throw "Windows clipboard native binding failed to load" }

          & (Join-Path $downloadDirectory "install.ps1") -InstallDir $installDirectory -NoPath -Uninstall
          if ($LASTEXITCODE -ne 0 -or (Test-Path -LiteralPath $installDirectory)) {
            throw "install.ps1 uninstall verification failed"
          }

          Write-Host "verified_tag=$tag"
          Write-Host "verified_version=$version"
          Write-Host "verified_draft=$($release.draft)"
          Write-Host "source_commit=$sourceCommit"
          Write-Host "assets=8"
          Write-Host "api_digests=ok"
          Write-Host "manifest=ok"
          Write-Host "windows_install=ok"
          Write-Host "windows_binary=ok"
          Write-Host "windows_process_tools=ok"
          Write-Host "windows_clipboard=ok"
          Write-Host "windows_uninstall=ok"
