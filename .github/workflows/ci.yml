name: Verify Distribution Source

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: distribution-source-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout distribution source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22.19.0"

      - name: Verify distribution source and release policies
        run: |
          node --test .github/scripts/*.test.mjs
          node .github/scripts/verify-distribution-entrypoints.mjs
          node .github/scripts/verify-release-workflow-policy.mjs
          node .github/scripts/verify-ci-workflow-policy.mjs
          bash -n install.sh
          shellcheck -x install.sh
          git diff --check
